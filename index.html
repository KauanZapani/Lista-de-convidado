<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Lista de Convidados</h1>
        
        <input type="text" id="searchInput" placeholder="Pesquisar nome...">

        <div class="lists-wrapper">
            <section>
                <h2>Começam com "A"</h2>
                <ul id="listaA" class="guest-list"></ul>
            </section>

            <section>
                <h2>Mais de 5 Letras</h2>
                <ul id="listaLongos" class="guest-list"></ul>
            </section>

            <section>
                <h2>Outros Convidados</h2>
                <ul id="listaOutros" class="guest-list"></ul>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
